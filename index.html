<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow Pro</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --bg: #1c1f2e;
  --bg2: #242838;
  --bg3: #2c3045;
  --border: #363b52;
  --text: #eceef5;
  --text-sub: #8b93b8;
  --accent: #5b7cfa;
  --accent2: #a78bfa;
  --success: #34d399;
  --warn: #fbbf24;
  --danger: #f87171;
  --card-r: 12px;
  --font-head: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', 'Meiryo', 'Yu Gothic', sans-serif;
  --font-body: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', 'Meiryo', 'Yu Gothic', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  height: 100vh;
  display: flex;
  overflow: hidden;
}

/* ── SIDEBAR ── */
#sidebar {
  width: 220px;
  min-width: 220px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 24px 0 16px;
  gap: 4px;
  position: fixed;
  top: 0;
  left: 0;
  height: 100vh;
  overflow-y: auto;
  z-index: 10;
}

/* ── MAIN ── */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  margin-left: 220px;
  min-width: 0;
  height: 100vh;
  overflow: hidden;
}

/* ── NAV ── */
.logo {
  padding: 0 20px 20px;
  font-size: 18px; font-weight: 800; color: var(--text);
  display: flex; align-items: center; gap: 10px;
}
.logo span { color: var(--accent); }
.nav-section {
  padding: 6px 12px 2px; font-size: 10px; font-weight: 600;
  letter-spacing: 1.2px; color: var(--text-sub); text-transform: uppercase;
}
.nav-item {
  display: flex; align-items: center; gap: 10px; padding: 9px 20px;
  cursor: pointer; font-size: 13.5px; font-weight: 500; color: var(--text-sub);
  border-left: 3px solid transparent; transition: all .15s; margin: 1px 0;
}
.nav-item:hover { color: var(--text); background: var(--bg3); }
.nav-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(91,124,250,.08); }
.nav-item i { width: 18px; text-align: center; font-size: 13px; }

/* ── TOPBAR ── */
#topbar {
  height: 56px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 5;
}
#topbar h1 {
  font-family: var(--font-head);
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.3px;
}
.sync-pill {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 12px;
  color: var(--text-sub);
  padding: 4px 12px;
  background: var(--bg3);
  border-radius: 20px;
  border: 1px solid var(--border);
  cursor: default;
}
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-sub); }
.sync-dot.ok { background: var(--success); box-shadow: 0 0 6px var(--success); }
.sync-dot.err { background: var(--danger); }
.sync-dot.spin { background: var(--warn); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.ml-auto { margin-left: auto; }
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 7px 16px; border-radius: 8px; border: none; cursor: pointer;
  font-family: var(--font-body); font-size: 13px; font-weight: 600;
  transition: all .15s;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #4a6be8; }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.btn-ghost { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--border); }
.btn-danger-soft { background: rgba(248,113,113,.12); color: var(--danger); border: 1px solid rgba(248,113,113,.3); }
.btn-danger-soft:hover { background: rgba(248,113,113,.22); }

/* ── CONTENT ── */
#content {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}

/* ── FILTER BAR ── */
.filter-bar {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  align-items: center;
}
.search-wrap {
  position: relative;
  flex: 1;
  min-width: 200px;
}
.search-wrap input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px 8px 36px;
  border-radius: 8px;
  font-size: 13px;
  font-family: var(--font-body);
  outline: none;
  transition: border-color .15s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap i {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--text-sub); font-size: 13px; pointer-events: none;
}
select, .sel {
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text); padding: 8px 12px; border-radius: 8px;
  font-size: 13px; font-family: var(--font-body); outline: none; cursor: pointer;
}
select:focus { border-color: var(--accent); }

/* ── TASK TABLE ── */
.task-table-wrap { overflow-x: auto; }
.task-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.task-table th {
  text-align: left; padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  color: var(--text-sub); font-weight: 600;
  font-size: 11px; letter-spacing: .8px; text-transform: uppercase;
  white-space: nowrap;
}
.task-table td {
  padding: 12px 14px;
  border-bottom: 1px solid rgba(37,42,56,.6);
  vertical-align: middle;
}
.task-table tr:hover td { background: rgba(255,255,255,.02); }
.task-name {
  font-weight: 600; color: var(--text);
  max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.task-desc {
  font-size: 11.5px; color: var(--text-sub);
  max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* status/priority badges */
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap;
}
.s-todo  { background: rgba(123,130,160,.15); color: var(--text-sub); }
.s-wip   { background: rgba(91,124,250,.15);  color: var(--accent); }
.s-done  { background: rgba(52,211,153,.15);  color: var(--success); }
.s-hold  { background: rgba(251,191,36,.12);  color: var(--warn); }
.p-high  { background: rgba(248,113,113,.12); color: var(--danger); }
.p-mid   { background: rgba(251,191,36,.12);  color: var(--warn); }
.p-low   { background: rgba(52,211,153,.12);  color: var(--success); }
.p-none  { background: transparent; color: var(--text-sub); }

.avatar {
  width: 26px; height: 26px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.member-cell { display: flex; align-items: center; gap: 8px; }

.progress-bar-wrap {
  width: 80px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden;
}
.progress-bar-fill { height: 100%; border-radius: 3px; background: var(--accent); }

.date-cell { white-space: nowrap; font-size: 12px; color: var(--text-sub); }
.date-over { color: var(--danger) !important; }
.date-near { color: var(--warn) !important; }

.row-actions { display: flex; gap: 6px; }
.icon-btn {
  background: none; border: none; color: var(--text-sub); cursor: pointer;
  padding: 4px 6px; border-radius: 6px; transition: all .15s;
  font-size: 13px;
}
.icon-btn:hover { color: var(--accent); background: rgba(91,124,250,.1); }
.icon-btn.del:hover { color: var(--danger); background: rgba(248,113,113,.1); }

/* ── KANBAN ── */
.kanban-wrap {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  min-height: 500px;
}
.kanban-col { background: var(--bg2); border-radius: var(--card-r); border: 1px solid var(--border); overflow: hidden; }
.kanban-col-head {
  padding: 14px 16px 10px;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--border);
}
.kanban-col-head .col-title { font-weight: 700; font-size: 13px; font-family: var(--font-head); }
.kanban-col-head .col-count {
  margin-left: auto; font-size: 11px; font-weight: 600;
  background: var(--bg3); padding: 2px 8px; border-radius: 20px; color: var(--text-sub);
}
.kanban-cards { padding: 12px; display: flex; flex-direction: column; gap: 8px; min-height: 60px; }
.kanban-card {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
  padding: 12px 14px; cursor: pointer; transition: all .15s;
}
.kanban-card:hover { border-color: var(--accent); transform: translateY(-1px); }
.kc-name { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
.kc-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.kc-cat { font-size: 11px; color: var(--text-sub); background: var(--border); padding: 2px 7px; border-radius: 10px; }

/* ── DASHBOARD ── */
.dash-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--card-r); padding: 20px 22px;
}
.stat-label { font-size: 11px; color: var(--text-sub); font-weight: 600; letter-spacing: .8px; text-transform: uppercase; margin-bottom: 8px; }
.stat-val { font-family: var(--font-head); font-size: 36px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
.stat-sub { font-size: 12px; color: var(--text-sub); margin-top: 4px; }

.section-head {
  font-family: var(--font-head); font-size: 14px; font-weight: 700; margin-bottom: 12px;
  display: flex; align-items: center; gap: 10px;
}
.section-head::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.chart-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--card-r); padding: 20px; }
.dash-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
.dash-3col { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 24px; }

/* bar chart custom */
.bar-chart { display: flex; flex-direction: column; gap: 10px; }
.bar-row { display: flex; align-items: center; gap: 12px; }
.bar-label { width: 90px; font-size: 12px; color: var(--text-sub); text-align: right; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bar-track { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; transition: width .5s; }
.bar-val { width: 36px; font-size: 12px; color: var(--text-sub); text-align: right; flex-shrink: 0; }

/* donut */
.donut-wrap { display: flex; align-items: center; gap: 24px; }
.donut-legend { display: flex; flex-direction: column; gap: 8px; }
.legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* member card in dashboard */
.member-stat-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--card-r); padding: 18px;
  display: flex; flex-direction: column; gap: 10px;
}
.member-stat-head { display: flex; align-items: center; gap: 10px; }
.member-stat-name { font-weight: 600; font-size: 14px; }
.member-stat-role { font-size: 11px; color: var(--text-sub); }
.member-stat-nums { display: flex; gap: 14px; }
.msn-item { text-align: center; }
.msn-val { font-family: var(--font-head); font-size: 20px; font-weight: 700; }
.msn-lbl { font-size: 10px; color: var(--text-sub); }

/* ── SUMMARY ── */
.summary-table {
  width: 100%; border-collapse: collapse; font-size: 13px;
}
.summary-table th {
  text-align: left; padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  color: var(--text-sub); font-size: 11px; letter-spacing: .8px; text-transform: uppercase; font-weight: 600;
}
.summary-table td { padding: 12px 14px; border-bottom: 1px solid rgba(37,42,56,.6); }
.summary-table tr:hover td { background: rgba(255,255,255,.02); }
.eff-bar-wrap { width: 80px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; display: inline-block; vertical-align: middle; margin-left: 8px; }
.eff-bar-fill { height: 100%; border-radius: 3px; }

/* ── SUMMARY TABS ── */
.tab-bar { display:flex; gap:4px; margin-bottom:20px; border-bottom:1px solid var(--border); }
.tab-btn {
  padding:9px 18px; font-size:13px; font-weight:600; cursor:pointer;
  border:none; background:none; color:var(--text-sub); border-bottom:2px solid transparent;
  transition:all .15s; font-family:var(--font-body); margin-bottom:-1px;
}
.tab-btn:hover { color:var(--text); }
.tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
.report-day { margin-bottom:20px; }
.report-day-head {
  font-size:13px; font-weight:700; padding:8px 14px;
  background:var(--bg3); border-radius:8px 8px 0 0;
  border:1px solid var(--border); border-bottom:none;
  display:flex; align-items:center; gap:10px;
}
.report-entries { border:1px solid var(--border); border-radius:0 0 8px 8px; overflow:hidden; }
.report-entry {
  display:grid; grid-template-columns:1fr 90px 1.5fr;
  border-bottom:1px solid rgba(37,42,56,.5);
}
.report-entry:last-child { border-bottom:none; }
.report-entry > div { padding:10px 14px; font-size:13px; }
.report-task { font-weight:600; border-right:1px solid var(--border); }
.report-time { color:var(--accent); font-weight:700; font-family:var(--font-head); border-right:1px solid var(--border); }
.report-memo { color:var(--text-sub); }
.report-member-section { margin-bottom:24px; }
.report-member-head {
  display:flex; align-items:center; gap:8px; margin-bottom:10px;
  font-size:13px; font-weight:700;
}

/* ── MEMBERS PANEL ── */
.members-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); gap: 16px; }
.member-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--card-r); padding: 20px;
  display: flex; align-items: center; gap: 16px;
}
.member-card .av-big { width: 48px; height: 48px; border-radius: 50%; font-size: 18px; font-weight: 700; color: #fff; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.member-info { flex: 1; min-width: 0; }
.member-info strong { font-size: 15px; font-weight: 700; font-family: var(--font-head); }
.member-info small { font-size: 12px; color: var(--text-sub); }
.member-actions { display: flex; gap: 6px; }

/* ── SETTINGS ── */
.settings-section { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--card-r); padding: 24px; margin-bottom: 20px; }
.settings-section h3 { font-family: var(--font-head); font-size: 15px; font-weight: 700; margin-bottom: 6px; }
.settings-section p { font-size: 13px; color: var(--text-sub); margin-bottom: 16px; }
.url-row { display: flex; gap: 10px; }
.url-row input {
  flex: 1; background: var(--bg3); border: 1px solid var(--border); color: var(--text);
  padding: 9px 12px; border-radius: 8px; font-size: 13px; font-family: var(--font-body); outline: none;
}
.url-row input:focus { border-color: var(--accent); }
.info-box {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
  padding: 14px 16px; font-size: 12.5px; color: var(--text-sub); line-height: 1.7; margin-top: 14px;
}
.info-box code { background: rgba(255,255,255,.06); padding: 1px 5px; border-radius: 4px; color: var(--accent2); }
.info-box strong { color: var(--text); }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.65); backdrop-filter: blur(4px);
  z-index: 100; display: none; align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 16px;
  width: 520px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
  padding: 28px; display: flex; flex-direction: column; gap: 16px;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; }
.modal-head h2 { font-family: var(--font-head); font-size: 18px; font-weight: 800; }
.modal-close { background: none; border: none; color: var(--text-sub); cursor: pointer; font-size: 18px; padding: 4px 8px; border-radius: 6px; transition: all .15s; }
.modal-close:hover { color: var(--text); background: var(--bg3); }
.form-row { display: flex; gap: 12px; }
.form-group { display: flex; flex-direction: column; gap: 6px; flex: 1; }
.form-group label { font-size: 12px; font-weight: 600; color: var(--text-sub); letter-spacing: .5px; }
.form-group input, .form-group select, .form-group textarea {
  background: var(--bg3); border: 1px solid var(--border); color: var(--text);
  padding: 9px 12px; border-radius: 8px; font-size: 13px; font-family: var(--font-body); outline: none;
  transition: border-color .15s; width: 100%; min-width: 0; box-sizing: border-box;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
.form-group textarea { resize: vertical; min-height: 70px; }
.modal-foot { display: flex; gap: 10px; justify-content: flex-end; }
.range-wrap { display: flex; align-items: center; gap: 10px; }
.range-wrap input[type=range] { flex: 1; accent-color: var(--accent); }
.range-wrap span { width: 36px; text-align: right; font-size: 13px; }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 200;
  background: var(--bg3); border: 1px solid var(--border); color: var(--text);
  padding: 10px 18px; border-radius: 10px; font-size: 13px;
  display: flex; align-items: center; gap: 8px;
  transform: translateY(80px); opacity: 0; transition: all .3s;
  pointer-events: none;
}
#toast.show { transform: none; opacity: 1; }
#toast.ok i { color: var(--success); }
#toast.err i { color: var(--danger); }

/* ── LOADING ── */
#loading-overlay {
  position: fixed; inset: 0; background: rgba(13,15,20,.7); backdrop-filter: blur(3px);
  z-index: 300; display: none; align-items: center; justify-content: center;
}
#loading-overlay.show { display: flex; }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.empty-state { text-align: center; color: var(--text-sub); padding: 60px 20px; font-size: 14px; }
.empty-state i { font-size: 36px; margin-bottom: 12px; display: block; }

/* color picker row */
.color-opts { display: flex; gap: 8px; flex-wrap: wrap; }
.color-opt { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border-color .15s; }
.color-opt.selected { border-color: #fff; }

/* worklog section inside modal */
.worklog-section { border-top: 1px solid var(--border); padding-top: 14px; }
.worklog-section h4 { font-size: 12px; font-weight: 600; color: var(--text-sub); margin-bottom: 10px; letter-spacing: .5px; text-transform: uppercase; }
.worklog-row { display: flex; gap: 8px; align-items: center; }
.worklog-row input[type=date] { flex:1; min-width:0; background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 7px 10px; border-radius: 6px; font-size: 12px; font-family: var(--font-body); outline: none; }
.worklog-row input[type=date]:focus { border-color: var(--accent); }
.worklog-row input[type=number] { width: 80px; min-width:0; background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 7px 10px; border-radius: 6px; font-size: 12px; font-family: var(--font-body); outline: none; }
.worklog-row input[type=number]:focus { border-color: var(--accent); }
.worklog-row select.wl-min { width: 90px; min-width:0; background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 7px 8px; border-radius: 6px; font-size: 12px; font-family: var(--font-body); outline: none; cursor: pointer; }
.worklog-row select.wl-min:focus { border-color: var(--accent); }
.worklog-row .del-row { background:none; border:none; color:var(--text-sub); cursor:pointer; padding:4px 6px; border-radius:5px; font-size:12px; transition:all .15s; }
.worklog-row .del-row:hover { color:var(--danger); background:rgba(248,113,113,.1); }
/* ── KANBAN D&D ── */
.kanban-card[draggable="true"] { cursor: grab; }
.kanban-card[draggable="true"]:active { cursor: grabbing; }
.kanban-card.dragging { opacity: .4; transform: scale(.97); }
.kanban-cards.drag-over {
  background: rgba(91,124,250,.08);
  outline: 2px dashed var(--accent);
  outline-offset: -4px;
  border-radius: 8px;
}
.kc-drag-handle {
  color: var(--border); font-size: 11px; margin-bottom: 4px;
  cursor: grab; user-select: none;
}

.kc-empty { text-align:center; color:var(--text-sub); font-size:12px; padding:28px 20px; }

/* ── CALENDAR ── */
.cal-grid {
  display: grid; grid-template-columns: repeat(7,1fr); gap: 1px;
  background: var(--border); border: 1px solid var(--border); border-radius: var(--card-r); overflow: hidden;
}
.cal-head-cell {
  background: var(--bg2); padding: 8px 4px; text-align: center;
  font-size: 11px; font-weight: 700; color: var(--text-sub); letter-spacing: .5px;
}
.cal-head-cell.sun { color: var(--danger); }
.cal-head-cell.sat { color: var(--accent2); }
.cal-cell {
  background: var(--bg2); min-height: 110px; padding: 6px;
  display: flex; flex-direction: column; gap: 3px;
}
.cal-cell.other-month { background: var(--bg); opacity: .6; }
.cal-cell.today { background: rgba(91,124,250,.07); }
.cal-date {
  font-size: 12px; font-weight: 700; width: 24px; height: 24px;
  display: flex; align-items: center; justify-content: center; border-radius: 50%;
  flex-shrink: 0; align-self: flex-start;
}
.cal-date.today-num { background: var(--accent); color: #fff; }
.cal-date.sun { color: var(--danger); }
.cal-date.sat { color: var(--accent2); }
.cal-task {
  font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 4px;
  color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  cursor: pointer; transition: opacity .15s;
}
.cal-task:hover { opacity: .8; }
.cal-task.repeat { opacity: .85; border-left: 3px solid rgba(255,255,255,.4); }
.cal-more { font-size: 10px; color: var(--text-sub); padding: 1px 4px; cursor: pointer; }
.cal-nav { display:flex; align-items:center; gap:8px; margin-bottom:16px; }
.cal-nav button {
  background: var(--bg3); border: 1px solid var(--border); color: var(--text);
  padding: 5px 14px; border-radius: 6px; cursor: pointer; font-size: 15px; transition: all .15s;
}
.cal-nav button:hover { border-color: var(--accent); color: var(--accent); }
.cal-nav-label { font-size: 15px; font-weight: 700; min-width: 120px; text-align: center; font-family: var(--font-head); }


.gantt-wrap { overflow-x: auto; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--card-r); }
.gantt-table { border-collapse: collapse; min-width: 100%; }
.gantt-table th {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 8px 6px; font-size: 11px; font-weight: 600; color: var(--text-sub);
  white-space: nowrap; position: sticky; top: 0; z-index: 2; text-align: center;
}
.gantt-table td { border-bottom: 1px solid rgba(37,42,56,.5); vertical-align: middle; }
.gantt-label {
  padding: 8px 14px; position: sticky; left: 0; z-index: 1;
  background: var(--bg2); min-width: 220px; max-width: 260px; border-right: 1px solid var(--border);
}
.gantt-label-name { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
.gantt-label-name:hover { color: var(--accent); }
.gantt-label-sub { font-size: 11px; color: var(--text-sub); margin-top: 2px; display: flex; align-items: center; gap: 6px; }
.gantt-label-th { position: sticky; left: 0; z-index: 3; background: var(--bg2); border-right: 1px solid var(--border); min-width: 220px; text-align: left !important; padding-left: 14px !important; }
.gantt-cell { width: 28px; min-width: 28px; padding: 3px 0; }
.gantt-cell.today-col { background: rgba(91,124,250,.07); }
.gantt-bar-wrap { position: relative; height: 26px; }
.gantt-bar {
  position: absolute; height: 22px; border-radius: 5px; top: 2px;
  display: flex; align-items: center; padding: 0 7px;
  font-size: 10px; font-weight: 700; color: #fff; overflow: hidden;

}
.gantt-bar:hover { opacity: .82; }
.gantt-bar.done { opacity: .4; }
.gantt-today-th { color: var(--accent) !important; font-weight: 800 !important; }
.gantt-filter-bar { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
.gantt-month-nav { display: flex; align-items: center; gap: 8px; }
.gantt-month-nav button {
  background: var(--bg3); border: 1px solid var(--border); color: var(--text);
  padding: 5px 14px; border-radius: 6px; cursor: pointer; font-size: 15px; transition: all .15s;
}
.gantt-month-nav button:hover { border-color: var(--accent); color: var(--accent); }
.gantt-month-label { font-size: 15px; font-weight: 700; min-width: 120px; text-align: center; font-family: var(--font-head); }


  background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px;
}
.dm-meta-label { font-size: 10px; color: var(--text-sub); font-weight: 600; letter-spacing: .8px; text-transform: uppercase; margin-bottom: 4px; }

/* task-name clickable */

<script>
// ── STATE ──────────────────────────────────────────────────────────
// ★ここにGASのデプロイURLを入力してください★
const DEFAULT_GAS_URL = '';
// ローカル設定より DEFAULT_GAS_URL を優先（空の場合はローカル設定を使用）
let GAS_URL = DEFAULT_GAS_URL || localStorage.getItem('tfp_gas_url') || '';
let members = JSON.parse(localStorage.getItem('tfp_members') || '[]');
let tasks   = JSON.parse(localStorage.getItem('tfp_tasks')   || '[]');
let currentView = 'tasks';

// ── UTILS ──────────────────────────────────────────────────────────
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const newId = () => 't' + Date.now() + Math.random().toString(36).slice(2,6);
const today = () => { const d = new Date(); return d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0'); };
const roundH = h => { const n = Math.round(parseFloat(h) * 10) / 10; return n % 1 === 0 ? n : n.toFixed(1); };
// URL を自動リンク化
const linkify = s => {
  if (!s) return '';
  return esc(s).replace(
    /(https?:\/\/[^\s\u3000\u3001\u3002\uff01-\uffee]+)/g,
    '<a href="$1" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:underline;text-underline-offset:2px;word-break:break-all">$1</a>'
  );
};
// input[type=date] 用に yyyy-mm-dd 形式に変換（表示専用）
const toInputDate = s => {
  if (!s) return '';
  // 既に yyyy-mm-dd ならそのまま
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  // yyyy/mm/dd → yyyy-mm-dd
  if (/^\d{4}\/\d{2}\/\d{2}$/.test(s)) return s.replace(/\//g, '-');
  // その他（英語形式など）はDateで変換
  const d = new Date(s);
  if (isNaN(d)) return '';
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
};
// date input の値（yyyy-mm-dd）をアプリ内形式（yyyy/mm/dd）に変換して保存
const fromInputDate = s => s ? s.replace(/-/g, '/') : '';
const formatDisplayDate = s => {
  if (!s) return '';
  const d = new Date(s);
  if (isNaN(d)) return s;
  return d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0');
};
const save  = () => {
  localStorage.setItem('tfp_tasks',   JSON.stringify(tasks));
  localStorage.setItem('tfp_members', JSON.stringify(members));
};
const getMember   = name => members.find(m => m.名前 === name) || members.find(m => m.id === name);
const memberColor = name => { const m = getMember(name); return m ? m.カラー : '#7b82a0'; };
const initials    = name => (name||'?').split(/\s/).map(p=>p[0]).join('').slice(0,2).toUpperCase();

// ステータス・優先度は日本語値で統一
const STATUS_VALUES = ['未着手','進行中','完了','保留'];
const STATUS_CLS    = { '未着手':'s-todo', '進行中':'s-wip', '完了':'s-done', '保留':'s-hold' };
// 旧英語キーとの互換
const STATUS_CLS_EN = { todo:'s-todo', wip:'s-wip', done:'s-done', hold:'s-hold' };
const PRIO_VALUES   = ['高','中','低'];
const PRIO_CLS      = { '高':'p-high', '中':'p-mid', '低':'p-low', '':'p-none' };
const PRIO_CLS_EN   = { high:'p-high', mid:'p-mid', low:'p-low' };

// 旧英語値→日本語変換（既存データ互換）
const STATUS_NORMALIZE = { todo:'未着手', wip:'進行中', done:'完了', hold:'保留' };
const PRIO_NORMALIZE   = { high:'高', mid:'中', low:'低' };

function normalizeDate(s) {
  if (!s) return '';
  const d = new Date(s);
  if (isNaN(d)) return s;
  return d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0');
}

function normalizeTask(t) {
  // ステータス
  if (STATUS_NORMALIZE[t['ステータス']]) t['ステータス'] = STATUS_NORMALIZE[t['ステータス']];
  // 優先度
  if (PRIO_NORMALIZE[t['優先度']]) t['優先度'] = PRIO_NORMALIZE[t['優先度']];
  // 担当者ID→担当者名への移行（旧データ互換）
  if (t['担当者ID'] && !t['担当者名']) {
    const m = members.find(x => x.id === t['担当者ID']);
    if (m) { t['担当者名'] = m.名前; delete t['担当者ID']; }
  }
  // 作成日・期限・開始日・作業日の日付を正規化
  ['作成日','期限','開始日','作業日'].forEach(k => {
    if (t[k]) t[k] = normalizeDate(t[k]);
  });
  // スプシの「作業日」+「実績工数」を作業ログに変換（作業ログが空の場合のみ）
  let logs = [];
  try { logs = t['作業ログ'] ? JSON.parse(t['作業ログ']) : []; } catch { logs = []; }
  if (logs.length === 0 && t['作業日'] && parseFloat(t['実績工数']) > 0) {
    const mins = Math.round(parseFloat(t['実績工数']) * 60);
    t['作業ログ'] = JSON.stringify([{ date: t['作業日'], mins, memo: '' }]);
  }
  return t;
}

function getStatusCls(s)  { return STATUS_CLS[s] || STATUS_CLS_EN[s] || 's-todo'; }
function getPrioCls(p)    { return PRIO_CLS[p]   || PRIO_CLS_EN[p]   || 'p-mid'; }

function dateClass(d) {
  if (!d) return '';
  const diff = (new Date(d) - new Date()) / 86400000;
  if (diff < 0) return 'date-over';
  if (diff < 3) return 'date-near';
  return '';
}

function toast(msg, ok=true) {
  const el = document.getElementById('toast');
  el.querySelector('i').className = ok ? 'fa-solid fa-check-circle' : 'fa-solid fa-circle-xmark';
  el.className = ok ? 'show ok' : 'show err';
  document.getElementById('toast-msg').textContent = msg;
  setTimeout(() => el.className = '', 3000);
}

function loading(show) {
  document.getElementById('loading-overlay').classList.toggle('show', show);
}

// ── SYNC ───────────────────────────────────────────────────────────
function setSyncState(state, msg) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  dot.className = 'sync-dot' + (state ? ' ' + state : '');
  lbl.textContent = msg;
}

async function gasPost(body) {
  if (!GAS_URL) throw new Error('GAS URLが設定されていません');
  const r = await fetch(GAS_URL, { method:'POST', body: JSON.stringify(body) });
  if (!r.ok) throw new Error('通信エラー: ' + r.status);
  const j = await r.json();
  if (!j.ok) throw new Error(j.error || 'エラー');
  return j;
}

async function syncAll() {
  if (!GAS_URL) { setSyncState('err','未接続 — 設定からURLを入力してください'); return; }
  setSyncState('spin','同期中...');
  loading(true);
  try {
    const [rm, rt] = await Promise.all([
      gasPost({ action:'getMembers' }),
      gasPost({ action:'getTasks' })
    ]);
    members = rm.members || [];
    tasks   = (rt.tasks || []).map(normalizeTask);
    save();
    setSyncState('ok', '同期済み — ' + new Date().toLocaleTimeString('ja-JP'));
    populateMemberSelect();
    renderView();
    toast('スプレッドシートと同期しました');
  } catch(e) {
    setSyncState('err','同期エラー: ' + e.message);
    toast('同期エラー: ' + e.message, false);
  } finally { loading(false); }
}

async function pushTask(task) {
  if (!GAS_URL) return;
  try { await gasPost({ action:'saveTask', task }); }
  catch(e) { console.warn('push failed:', e); }
}

// 既存行のみ更新（新規行を絶対に作らない）
async function pushTaskFields(id, fields) {
  if (!GAS_URL) return;
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  const merged = { ...t, ...fields };
  try { await gasPost({ action:'upsertTask', task: merged }); }
  catch(e) { console.warn('pushTaskFields failed:', e); }
}

async function pushDeleteTask(id) {
  if (!GAS_URL) return;
  try { await gasPost({ action:'deleteTask', id }); }
  catch(e) { console.warn('delete push failed:', e); }
}

async function pushMembers() {
  if (!GAS_URL) return;
  try { await gasPost({ action:'saveMembers', members }); }
  catch(e) { console.warn('member push failed:', e); }
}

// ── CALENDAR ────────────────────────────────────────────────────────
let calYear  = new Date().getFullYear();
let calMonth = new Date().getMonth();

function getTasksForDate(dateObj) {
  const y = dateObj.getFullYear();
  const m = dateObj.getMonth();
  const d = dateObj.getDate();
  const dow = dateObj.getDay();
  const dateStr = y + '/' + String(m+1).padStart(2,'0') + '/' + String(d).padStart(2,'0');
  const result = [];

  tasks.forEach(t => {
    const start = t['開始日'] ? new Date(t['開始日']) : null;
    const end   = t['期限']   ? new Date(t['期限'])   : null;
    const repeat = t['繰り返し'] ? t['繰り返し'].split(',').map(Number).filter(n=>!isNaN(n)) : [];

    // 繰り返しタスク：開始日〜期限の間の指定曜日
    if (repeat.length > 0 && repeat.includes(dow)) {
      const inRange = (!start || dateObj >= start) && (!end || dateObj <= end);
      if (inRange) { result.push({ ...t, _repeat: true }); return; }
    }

    // 期限がこの日のタスク
    if (t['期限'] && t['期限'] === dateStr) {
      if (!result.find(r => r.id === t.id)) result.push({ ...t, _deadline: true });
    }
  });

  return result;
}

function renderCalendar() {
  const year  = calYear;
  const month = calMonth;
  const today = new Date();
  const todayStr = today.getFullYear() + '/' + String(today.getMonth()+1).padStart(2,'0') + '/' + String(today.getDate()).padStart(2,'0');

  const firstDay = new Date(year, month, 1);
  const lastDay  = new Date(year, month + 1, 0);
  const startDow = firstDay.getDay(); // 0=日
  const totalCells = Math.ceil((startDow + lastDay.getDate()) / 7) * 7;

  const DOW_LABELS = ['日','月','火','水','木','金','土'];

  const cells = Array.from({ length: totalCells }, (_, i) => {
    const date = new Date(year, month, i - startDow + 1);
    const isThisMonth = date.getMonth() === month;
    const isToday = date.getFullYear()===today.getFullYear() && date.getMonth()===today.getMonth() && date.getDate()===today.getDate();
    const dow = date.getDay();
    const dayTasks = getTasksForDate(date);
    const show = dayTasks.slice(0, 3);
    const more = dayTasks.length - 3;

    const taskBadges = show.map(t => {
      const color = memberColor(t['担当者名'] || t['担当者ID']) || 'var(--accent)';
      const icon = t._repeat ? '🔁 ' : (t._deadline ? '⏰ ' : '');
      return `<div class="cal-task${t._repeat?' repeat':''}" style="background:${color}"
        onclick="openDetailModal('${esc(t.id)}')" title="${esc(t['タスク名'])}">
        ${icon}${esc(t['タスク名'])}
      </div>`;
    }).join('');

    const moreBadge = more > 0 ? `<div class="cal-more">+${more}件</div>` : '';

    const dateNumCls = `cal-date${isToday?' today-num':''} ${dow===0?'sun':dow===6?'sat':''}`;

    return `<div class="cal-cell${!isThisMonth?' other-month':''}${isToday?' today':''}">
      <div class="${dateNumCls}">${date.getDate()}</div>
      ${taskBadges}${moreBadge}
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="cal-nav">
      <button onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar()">&#8249;</button>
      <div class="cal-nav-label">${year}年${month+1}月</div>
      <button onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar()">&#8250;</button>
      <button class="btn btn-ghost btn-sm" onclick="calYear=new Date().getFullYear();calMonth=new Date().getMonth();renderCalendar()">今月</button>
    </div>
    <div class="cal-grid">
      ${DOW_LABELS.map((d,i)=>`<div class="cal-head-cell${i===0?' sun':i===6?' sat':''}">${d}</div>`).join('')}
      ${cells}
    </div>
    <div style="display:flex;gap:16px;margin-top:12px;font-size:12px;color:var(--text-sub)">
      <span>🔁 繰り返しタスク</span>
      <span>⏰ 期限タスク</span>
    </div>
  `;
}

// ── GANTT ───────────────────────────────────────────────────────────
let ganttYear  = new Date().getFullYear();
let ganttMonth = new Date().getMonth();
let ganttSort  = '期限'; // '期限' | '優先度'
let ganttSortDir = 1;

function renderGantt() {
  const year       = ganttYear;
  const month      = ganttMonth;
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayStr   = new Date().toISOString().slice(0, 10);
  const todayDate  = new Date(todayStr);
  const todayDay   = (todayDate.getFullYear()===year && todayDate.getMonth()===month) ? todayDate.getDate() : -1;

  const fm = document.getElementById('g-member')?.value || '';
  const fs = document.getElementById('g-status')?.value || '';
  const memberOpts = `<option value="">全メンバー</option>${members.map(m=>`<option value="${esc(m.名前)}" ${fm===m.名前?'selected':''}>${esc(m.名前)}</option>`).join('')}`;

  let list = tasks.filter(t => {
    if (fm && (t['担当者名']||t['担当者ID']) !== fm) return false;
    if (fs === '未完了' && !['未着手','進行中'].includes(t['ステータス'])) return false;
    else if (fs && fs !== '未完了' && t['ステータス'] !== fs) return false;
    return true;
  });

  const withDate    = list.filter(t => t['期限']);
  const withoutDate = list.filter(t => !t['期限']);

  // ソート
  withDate.sort((a, b) => {
    let va, vb;
    if (ganttSort === '優先度') {
      va = PRIO_ORDER[a['優先度']] ?? 3;
      vb = PRIO_ORDER[b['優先度']] ?? 3;
    } else {
      const toD = s => { const d = new Date(s||'9999/12/31'); return isNaN(d)?'9999-12-31':d.toISOString().slice(0,10); };
      va = toD(a['期限']); vb = toD(b['期限']);
    }
    return va < vb ? -ganttSortDir : va > vb ? ganttSortDir : 0;
  });

  const monthStart = new Date(year, month, 1);
  const monthEnd   = new Date(year, month, daysInMonth);

  // 日ヘッダー
  const dayHeaders = Array.from({length: daysInMonth}, (_, i) => {
    const d   = new Date(year, month, i + 1);
    const dow = ['日','月','火','水','木','金','土'][d.getDay()];
    const isToday = (i + 1) === todayDay;
    const isWknd  = d.getDay() === 0 || d.getDay() === 6;
    return `<th class="gantt-cell${isToday?' gantt-today-th':''}" style="${isWknd?'color:rgba(167,139,250,.8)':''}">
      ${i+1}<br><span style="font-size:9px">${dow}</span>
    </th>`;
  }).join('');

  // 各タスク行：バーをspanセル結合で表現
  const rows = withDate.map(t => {
    const mname   = t['担当者名'] || t['担当者ID'] || '';
    const m       = getMember(mname);
    const color   = memberColor(mname);
    const deadline  = new Date(t['期限']);
    const startDate = t['開始日'] ? new Date(t['開始日']) : deadline;

    // 月内にクリップ
    const barStart = new Date(Math.max(startDate.getTime(), monthStart.getTime()));
    const barEnd   = new Date(Math.min(deadline.getTime(), monthEnd.getTime()));
    const inMonth  = barStart <= monthEnd && barEnd >= monthStart;

    const startDay = barStart.getDate(); // 1-based
    const endDay   = barEnd.getDate();
    const isDone   = t['ステータス'] === '完了';

    // td を1日ずつ生成、バーの範囲は結合して描画
    let cells = '';
    let i = 1;
    while (i <= daysInMonth) {
      const isToday = i === todayDay;
      const todayStyle = isToday ? 'background:rgba(91,124,250,.07)' : '';

      if (inMonth && i === startDay) {
        const span = endDay - startDay + 1;
        cells += `<td class="gantt-cell" colspan="${span}" style="${todayStyle}">
          <div class="gantt-bar-wrap" style="width:${span*28-2}px">
            <div class="gantt-bar${isDone?' done':''}"
              style="width:100%;background:${color};position:relative;left:0"
              onclick="openDetailModal('${esc(t.id)}')"
              title="${esc(t['タスク名'])} (${formatDisplayDate(t['期限'])})">
              ${esc(t['タスク名'])}
            </div>
          </div>
        </td>`;
        i += span;
      } else {
        cells += `<td class="gantt-cell" style="${todayStyle}"></td>`;
        i++;
      }
    }

    return `<tr>
      <td class="gantt-label">
        <div class="gantt-label-name" onclick="openDetailModal('${esc(t.id)}')">${esc(t['タスク名'])}</div>
        <div class="gantt-label-sub">
          ${m ? `<div class="avatar" style="background:${esc(m.カラー)};width:16px;height:16px;font-size:7px;flex-shrink:0">${esc(initials(m.名前))}</div><span>${esc(m.名前)}</span>` : ''}
          <span class="badge ${getStatusCls(t['ステータス'])}" style="font-size:9px;padding:1px 5px">${esc(t['ステータス']||'未着手')}</span>
          ${t['優先度'] ? `<span class="badge ${getPrioCls(t['優先度'])}" style="font-size:9px;padding:1px 5px">${esc(t['優先度'])}</span>` : ''}
        </div>
      </td>
      ${cells}
    </tr>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="gantt-filter-bar">
      <div class="gantt-month-nav">
        <button onclick="ganttMonth--;if(ganttMonth<0){ganttMonth=11;ganttYear--;}renderGantt()">&#8249;</button>
        <div class="gantt-month-label">${year}年${month+1}月</div>
        <button onclick="ganttMonth++;if(ganttMonth>11){ganttMonth=0;ganttYear++;}renderGantt()">&#8250;</button>
        <button class="btn btn-ghost btn-sm" onclick="ganttYear=new Date().getFullYear();ganttMonth=new Date().getMonth();renderGantt()">今月</button>
      </div>
      <select id="g-member" onchange="renderGantt()" style="background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:8px;font-size:13px;outline:none">${memberOpts}</select>
      <select id="g-status" onchange="renderGantt()" style="background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:8px;font-size:13px;outline:none">
        <option value="" ${fs===''?'selected':''}>全ステータス</option>
        <option value="未完了" ${fs==='未完了'?'selected':''}>未完了</option>
        ${STATUS_VALUES.map(s=>`<option value="${s}" ${fs===s?'selected':''}>${s}</option>`).join('')}
      </select>
      <div style="display:flex;gap:6px;margin-left:4px">
        <button class="btn btn-ghost btn-sm${ganttSort==='期限'?' active':''}"
          onclick="ganttSort==='期限'?ganttSortDir*=-1:(ganttSort='期限',ganttSortDir=1);renderGantt()"
          style="${ganttSort==='期限'?'border-color:var(--accent);color:var(--accent)':''}">
          期限 ${ganttSort==='期限'?(ganttSortDir===1?'▲':'▼'):''}
        </button>
        <button class="btn btn-ghost btn-sm${ganttSort==='優先度'?' active':''}"
          onclick="ganttSort==='優先度'?ganttSortDir*=-1:(ganttSort='優先度',ganttSortDir=1);renderGantt()"
          style="${ganttSort==='優先度'?'border-color:var(--accent);color:var(--accent)':''}">
          優先度 ${ganttSort==='優先度'?(ganttSortDir===1?'▲':'▼'):''}
        </button>
      </div>
    </div>

    ${withDate.length === 0
      ? `<div class="empty-state"><i class="fa-solid fa-chart-gantt"></i>期限が設定されたタスクがありません</div>`
      : `<div class="gantt-wrap">
          <table class="gantt-table">
            <thead>
              <tr>
                <th class="gantt-label-th">タスク</th>
                ${dayHeaders}
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`
    }

    ${withoutDate.length > 0 ? `
      <div style="margin-top:20px">
        <div class="section-head">期限未設定のタスク（${withoutDate.length}件）</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px">
          ${withoutDate.map(t => {
            const mname = t['担当者名']||t['担当者ID']||'';
            return `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;cursor:pointer" onclick="openDetailModal('${esc(t.id)}')">

            </div>`;
          }).join('')}
        </div>
      </div>
    ` : ''}
  `;
}

  const cards = st => tasks.filter(t => {

              if ((t['ステータス']||'未着手') !== st) return false;
              if (st === '完了') {
                const doneDate = new Date(t['期限'] || t['作業日'] || t['作成日'] || '');

              return true;
            }).length}</div>

          <div class="kanban-cards" data-status="${st}"

// ── KANBAN DRAG & DROP ───────────────────────────────────────────────
let kcDraggingId = null;

function kcDragStart(e, id) {
  kcDraggingId = id;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', id);
  setTimeout(() => {
    const el = document.querySelector(`.kanban-card[data-id="${id}"]`);
    if (el) el.classList.add('dragging');
  }, 0);
}

function kcDragEnd(e) {
  document.querySelectorAll('.kanban-card.dragging').forEach(el => el.classList.remove('dragging'));
  document.querySelectorAll('.kanban-cards.drag-over').forEach(el => el.classList.remove('drag-over'));
  kcDraggingId = null;
}

function kcDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}

function kcDragLeave(e) {
  if (!e.currentTarget.contains(e.relatedTarget)) {
    e.currentTarget.classList.remove('drag-over');
  }
}

function kcDrop(e, newStatus) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const id = e.dataTransfer.getData('text/plain') || kcDraggingId;
  if (!id) return;
  const t = tasks.find(x => x.id === id);
  if (!t || t['ステータス'] === newStatus) return;
  t['ステータス'] = newStatus;
  save();
  pushTaskFields(id, { 'ステータス': newStatus });
  renderKanban();
  toast(`「${t['タスク名']}」を ${newStatus} に移動しました`);
}

function buildDonut(slices) {
  const total = slices.reduce((s,x)=>s+x.val,0)||1;
  const r=60, cx=70, cy=70, stroke=18;
  let offset=0;
  const paths = slices.filter(s=>s.val>0).map(s=>{
    const pct = s.val/total;
    const dash = pct * 2*Math.PI*r;
    const gap  = 2*Math.PI*r - dash;
    const el = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${stroke}" stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cy})" />`;
    offset += dash;
    return el;
  }).join('');
  return `<svg width="140" height="140" viewBox="0 0 140 140" style="flex-shrink:0">${paths}</svg>`;
}

let selectedMonths = new Set();
let summaryTab = 'stats'; // 'stats' | 'report'

function onMonthSelectChange() {
  const val = document.getElementById('month-select')?.value;
  if (!val || val === '__all__') selectedMonths.clear();

function toggleMonth(ym) {
  if (selectedMonths.has(ym)) selectedMonths.delete(ym);

  renderMonthTable();

function selectAllMonths(ymList) {
  ymList.forEach(ym => selectedMonths.add(ym));

function clearAllMonths() {
  selectedMonths.clear();
  renderMonthTable();
}

function renderSummaryReport() {
  // 全タスクの作業ログを展開してフラット化
  const allLogs = []; // { date, ym, mins, memo, taskName, memberName, taskId }
  tasks.forEach(t => {
    let logs = [];
    try { logs = t['作業ログ'] ? JSON.parse(t['作業ログ']) : []; } catch { logs = []; }
    logs.forEach(r => {
      if (!r.date) return;
      const d = new Date(r.date);
      if (isNaN(d)) return;
      const ym = d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0');
      const hours = r.hours !== undefined ? parseFloat(r.hours)||0 : (parseInt(r.mins)||0)/60;
      allLogs.push({
        date: r.date, ym,
        hours,
        memo: r.memo || '',
        taskName: t['タスク名'] || '',
        memberName: t['担当者名'] || t['担当者ID'] || '未割当',
        taskId: t.id
      });
    });
  });

  // 月一覧
  const ymSet = [...new Set(allLogs.map(l => l.ym))].sort((a,b)=>a<b?1:-1);

  // 選択中の月
  const selEl = document.getElementById('report-month-sel');
  let selYm = selEl?.value || (ymSet[0] || '');

  const filtered = allLogs.filter(l => l.ym === selYm);

  // メンバー別にグループ化
  const byMember = {};
  filtered.forEach(l => {
    if (!byMember[l.memberName]) byMember[l.memberName] = {};
    if (!byMember[l.memberName][l.date]) byMember[l.memberName][l.date] = [];
    byMember[l.memberName][l.date].push(l);
  });

  const hLabel = h => h > 0 ? (h % 1 === 0 ? h+'h' : h.toFixed(1)+'h') : '0h';

  const memberSections = Object.entries(byMember).map(([mname, days]) => {
    const m = getMember(mname);
    const color = m ? m.カラー : '#7b82a0';
    const totalH = Object.values(days).flat().reduce((s,l)=>s+l.hours,0);

    const daySections = Object.entries(days)
      .sort(([a],[b]) => a < b ? -1 : 1)
      .map(([date, logs]) => {
        const dayH = logs.reduce((s,l)=>s+l.hours,0);
        const entries = logs.map(l => `
          <div class="report-entry">
            <div class="report-task">${esc(l.taskName)}</div>
            <div class="report-time">${hLabel(l.hours)}</div>
            <div class="report-memo">${esc(l.memo) || '<span style="opacity:.4">—</span>'}</div>
          </div>
        `).join('');
        return `
          <div class="report-day">
            <div class="report-day-head">
              <i class="fa-regular fa-calendar" style="color:var(--text-sub)"></i>
              ${formatDisplayDate(date)}
              <span style="margin-left:auto;font-size:12px;color:var(--text-sub)">${hLabel(dayH)}</span>
            </div>
            <div class="report-entries">${entries}</div>
          </div>
        `;
      }).join('');

    return `
      <div class="report-member-section">
        <div class="report-member-head">
          <div class="avatar" style="background:${esc(color)};width:28px;height:28px;font-size:11px">${esc(initials(mname))}</div>
          ${esc(mname)}
          <span style="font-size:12px;color:var(--text-sub);font-weight:400;margin-left:4px">合計 ${hLabel(totalH)}</span>
        </div>
        ${daySections}
      </div>
    `;
  }).join('');

  document.getElementById('summary-body').innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap">
      <select id="report-month-sel" onchange="renderSummaryReport()"
        style="background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:8px;font-size:13px;outline:none">
        ${ymSet.length === 0
          ? '<option value="">データなし</option>'
          : ymSet.map(ym => `<option value="${ym}" ${ym===selYm?'selected':''}>${ym}</option>`).join('')}
      </select>
      <span style="font-size:13px;color:var(--text-sub)">${filtered.length}件のログ</span>
    </div>
    ${memberSections || `<div class="empty-state"><i class="fa-solid fa-file-lines"></i>この月の作業ログがありません</div>`}
  `;
}

function renderMonthTable() {
  const monthMap = buildMonthMap();
  const allMonths = Object.keys(monthMap).sort((a,b)=>a<b?1:-1);
  const tbody = document.getElementById('month-tbody');
  if (!tbody) return;

  const filtered = allMonths.filter(ym => selectedMonths.size === 0 || selectedMonths.has(ym));
  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:var(--text-sub);padding:30px">${allMonths.length===0?'作業日・作成日が記録されたタスクがありません':'月を選択してください'}</td></tr>`;
    return;
  }
  tbody.innerHTML = filtered.map(ym => {
    const {est, act, tasks:tc} = monthMap[ym];
    const re = roundH(est), ra = roundH(act);
    const diff = Math.round((act - est) * 10) / 10;
    const dc = diff > 0 ? 'var(--danger)' : diff < 0 ? 'var(--success)' : 'var(--text-sub)';
    return `<tr>
      <td style="font-weight:600">${ym}</td>
      <td>${tc}</td>
      <td style="font-family:var(--font-head)">${re}h</td>
      <td style="font-family:var(--font-head)">${ra}h</td>
      <td style="color:${dc};font-weight:600">${diff>0?'+':''}${diff.toFixed(1)}h</td>
    </tr>`;
  }).join('');
}

function buildMonthMap() {
  const monthMap = {};
  tasks.forEach(t => {
    // 予定工数は作業日ベースで集計（作業日 or 作成日の月に紐付け）
    const raw = t['作業日'] || t['作成日'] || '';
    if (raw) {
      const d = new Date(raw);
      if (!isNaN(d)) {
        const ym = d.getFullYear() + '/' + String(d.getMonth() + 1).padStart(2, '0');
        if (!monthMap[ym]) monthMap[ym] = { est:0, act:0, tasks:0 };
        monthMap[ym].est   += parseFloat(t['予定工数'])||0;
        monthMap[ym].tasks++;
      }
    }

    // 実績工数は作業ログの各エントリの日付ごとに集計
    let logs = [];
    try { logs = t['作業ログ'] ? JSON.parse(t['作業ログ']) : []; } catch { logs = []; }

    if (logs.length > 0) {
      logs.forEach(r => {
        if (!r.date) return;
        const d = new Date(r.date);
        if (isNaN(d)) return;
        const ym = d.getFullYear() + '/' + String(d.getMonth() + 1).padStart(2, '0');
        if (!monthMap[ym]) monthMap[ym] = { est:0, act:0, tasks:0 };
        monthMap[ym].act += parseFloat(r.hours)||0;
      });
    } else {
      // 作業ログがない場合は実績工数フィールドを作業日の月に紐付け
      if (raw) {
        const d = new Date(raw);
        if (!isNaN(d)) {
          const ym = d.getFullYear() + '/' + String(d.getMonth() + 1).padStart(2, '0');
          if (!monthMap[ym]) monthMap[ym] = { est:0, act:0, tasks:0 };
          monthMap[ym].act += parseFloat(t['実績工数'])||0;
        }
      }
    }
  });
  return monthMap;
}

function renderSummary() {
  // タブバーを先に描画
  document.getElementById('content').innerHTML = `
    <div class="tab-bar">
      <button class="tab-btn${summaryTab==='stats'?' active':''}" onclick="summaryTab='stats';renderSummary()">
        <i class="fa-solid fa-chart-bar"></i> 工数集計
      </button>
      <button class="tab-btn${summaryTab==='report'?' active':''}" onclick="summaryTab='report';renderSummary()">
        <i class="fa-solid fa-file-lines"></i> 作業報告
      </button>
    </div>
    <div id="summary-body"></div>
  `;

  if (summaryTab === 'report') { renderSummaryReport(); return; }

  // 月別工数（作業日フィールドから）
  const monthMap = buildMonthMap();
  const months = Object.entries(monthMap).sort(([a],[b])=>a<b?1:-1);
  const allMonths = months.map(([ym])=>ym);

  // 初回表示：直近3ヶ月を自動選択
  if (selectedMonths.size === 0 && allMonths.length > 0) {
    allMonths.slice(0, 3).forEach(ym => selectedMonths.add(ym));
  }

  // 進捗の合計 ÷ (タスク数×100) → 全完了で100%
  const avgProgress = tasks.length > 0
    ? Math.round(tasks.reduce((s,t) => s + (parseInt(t['進捗'])||0), 0) / (tasks.length * 100) * 100)
    : null;

  // メンバー別工数サマリー
  const mbrRows = members.map(m => {
    const mt = tasks.filter(t => (t['担当者名'] || t['担当者ID']) === m.名前);
    const est = roundH(mt.reduce((s,t)=>s+(parseFloat(t['予定工数'])||0),0));
    const act = roundH(mt.reduce((s,t)=>s+(parseFloat(t['実績工数'])||0),0));
    const avgProg = mt.length > 0
      ? Math.round(mt.reduce((s,t) => s + (parseInt(t['進捗'])||0), 0) / (mt.length * 100) * 100)
      : null;
    const progColor = avgProg === null ? 'var(--text-sub)' : avgProg >= 80 ? 'var(--success)' : avgProg >= 40 ? 'var(--warn)' : 'var(--accent)';
    return { m, est, act, avgProg, progColor, cnt: mt.length, done: mt.filter(t=>t['ステータス']==='完了').length };
  });

  // カテゴリ別工数
  const catH = {};
  tasks.forEach(t => {
    const c = t['カテゴリ']||'未分類';
    if (!catH[c]) catH[c] = { est:0, act:0 };
    catH[c].est += parseFloat(t['予定工数'])||0;
    catH[c].act += parseFloat(t['実績工数'])||0;
  });
  const catEntries = Object.entries(catH).sort((a,b)=>b[1].act-a[1].act);
  const maxH = catEntries[0]?.[1]?.act || 1;

  const totalEst = roundH(tasks.reduce((s,t)=>s+(parseFloat(t['予定工数'])||0),0));
  const totalAct = roundH(tasks.reduce((s,t)=>s+(parseFloat(t['実績工数'])||0),0));

  document.getElementById('summary-body').innerHTML = `
        <div class="stat-val" style="color:var(--accent)">${totalEst}<span style="font-size:18px;font-weight:400">h</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">総実績工数</div>
        <div class="stat-val" style="color:var(--accent2)">${totalAct}<span style="font-size:18px;font-weight:400">h</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">進捗達成率</div>
        <div class="stat-val" style="color:${avgProgress===null?'var(--text-sub)':avgProgress>=80?'var(--success)':avgProgress>=40?'var(--warn)':'var(--accent)'}">
          ${avgProgress !== null ? avgProgress : '—'}<span style="font-size:18px">%</span>
        </div>
        <div class="stat-sub">全タスク完了で100%</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">工数超過タスク</div>
        <div class="stat-val" style="color:var(--danger)">
          ${tasks.filter(t=>(parseFloat(t['実績工数'])||0)>(parseFloat(t['予定工数'])||0)&&parseFloat(t['予定工数'])>0).length}
        </div>
        <div class="stat-sub">予定オーバー</div>
      </div>
    </div>

    <div class="dash-2col">
      <div class="chart-wrap">
        <div class="section-head">メンバー別工数</div>
        <table class="summary-table">
          <thead><tr><th>メンバー</th><th>タスク数</th><th>予定(h)</th><th>実績(h)</th><th>進捗達成率</th></tr></thead>
          <tbody>
            ${mbrRows.length === 0 ? `<tr><td colspan="5" style="text-align:center;color:var(--text-sub);padding:30px">データなし</td></tr>` :
              mbrRows.map(({m,est,act,avgProg,progColor,cnt,done})=>`
                <tr>
                  <td><div class="member-cell"><div class="avatar" style="background:${esc(m.カラー)};width:24px;height:24px;font-size:9px">${esc(initials(m.名前))}</div>${esc(m.名前)}</div></td>
                  <td style="font-size:13px">${cnt}<span style="color:var(--text-sub);font-size:11px"> (完了${done})</span></td>
                  <td style="font-family:var(--font-head);font-size:14px">${est}h</td>
                  <td style="font-family:var(--font-head);font-size:14px">${act}h</td>
                  <td style="color:${progColor}">
                    ${avgProg !== null ? avgProg+'%' : '—'}
                    ${avgProg !== null ? `<div class="eff-bar-wrap"><div class="eff-bar-fill" style="width:${avgProg}%;background:${progColor}"></div></div>` : ''}
                  </td>
                </tr>
              `).join('')}
          </tbody>
        </table>
      </div>
      <div class="chart-wrap">
        <div class="section-head">カテゴリ別実績工数</div>
        <div class="bar-chart">
          ${catEntries.length === 0 ? '<p style="color:var(--text-sub);font-size:13px">データなし</p>' : catEntries.map(([c,{est,act}])=>`
            <div class="bar-row">
              <div class="bar-label" title="${esc(c)}">${esc(c)}</div>
              <div class="bar-track"><div class="bar-fill" style="width:${Math.round(act/maxH*100)}%;background:var(--accent2)"></div></div>
              <div class="bar-val">${act}h</div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>

    <div class="section-head">月別工数推移</div>
    <div class="chart-wrap">
      <div style="margin-bottom:14px;display:flex;align-items:center;gap:10px">
        <span style="font-size:12px;color:var(--text-sub);flex-shrink:0">表示月</span>
        <select id="month-select" onchange="onMonthSelectChange()" style="min-width:160px">
          <option value="__all__">すべての月</option>
          ${allMonths.map(ym => `<option value="${ym}" ${selectedMonths.size===1&&selectedMonths.has(ym)?'selected':''}>${ym}</option>`).join('')}
        </select>
      </div>
      <table class="summary-table">
        <thead><tr><th>月</th><th>タスク数</th><th>予定工数(h)</th><th>実績工数(h)</th><th>差異</th></tr></thead>
        <tbody id="month-tbody"></tbody>
      </table>
    </div>
  `;
  // プルダウンの初期値を反映
  const sel = document.getElementById('month-select');
  if (sel && selectedMonths.size === 1) sel.value = [...selectedMonths][0];
  else if (sel) sel.value = '__all__';
  renderMonthTable();
}

  const mname = t['担当者名'] || t['担当者ID'] || '';

    ? `<span class="${dc}">${formatDisplayDate(t['期限'])}</span>`
    : '<span style="color:var(--text-sub)">—</span>';

function dmProgressInput(val) {
  document.getElementById('dm-prog-val').textContent = val + '%';
  
  // リアルタイム保存
  const t = tasks.find(x => x.id === detailTaskId);
  if (!t) return;
  t['進捗'] = val;
  save();
  // ステータス自動更新
  if (parseInt(val) === 100 && t['ステータス'] !== '完了') {
    t['ステータス'] = '完了';
    document.getElementById('dm-status-btns').innerHTML =
      STATUS_VALUES.map(s =>
        `<button class="dm-status-btn${t['ステータス']===s?' active':''}" onclick="dmSetStatus('${s}')">${s}</button>`
      ).join('');
    document.getElementById('dm-badges').innerHTML =
      `<span class="badge ${getStatusCls('完了')}">完了</span>` +
      `<span class="badge ${getPrioCls(t['優先度'])}">${esc(t['優先度']||'中')}</span>`;
    pushTaskFields(detailTaskId, { '進捗': val, 'ステータス': '完了' });
  }
}

function dmSetStatus(status) {
  const t = tasks.find(x => x.id === detailTaskId);
  if (!t) return;
  t['ステータス'] = status;
  save();
  pushTaskFields(detailTaskId, { 'ステータス': status });
  document.getElementById('dm-status-btns').innerHTML =
    STATUS_VALUES.map(s =>
      `<button class="dm-status-btn${s===status?' active':''}" onclick="dmSetStatus('${s}')">${s}</button>`
    ).join('');
  document.getElementById('dm-badges').innerHTML =
    `<span class="badge ${getStatusCls(status)}">${esc(status)}</span>` +
    `<span class="badge ${getPrioCls(t['優先度'])}">${esc(t['優先度']||'中')}</span>`;
  toast('ステータスを更新しました');
}

  const row = rangeEl.closest('.kc-prog-row');
  if (row) row.querySelector('span').textContent = val + '%';
}

// 保存＋スプシ送信（指を離したとき1回だけ）
function kanbanProgSave(id, val) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  t['進捗'] = val;
  if (parseInt(val) === 100 && t['ステータス'] !== '完了') {
    t['ステータス'] = '完了';
    save();
    pushTaskFields(id, { '進捗': val, 'ステータス': '完了' });
    renderKanban();
  } else {
    save();
    pushTaskFields(id, { '進捗': val });
  }
}



let worklogRows = []; // [{ date: '', hours: '' }, ...]

function minOptions(selected) {
  const opts = [];
  for (let h = 0; h <= 24; h++) {
    for (let m = 0; m < 60; m += 10) {
      if (h === 24 && m > 0) break;
      const total = h * 60 + m;
      const label = h > 0 ? `${h}時間${m > 0 ? m+'分' : ''}` : `${m}分`;
      opts.push(`<option value="${total}" ${total == selected ? 'selected' : ''}>${label}</option>`);
    }
  }
  return opts.join('');
}

function minsToH(mins) {
  return mins > 0 ? (mins / 60).toFixed(2).replace(/\.?0+$/, '') : '0';
}

function addWorklogRow(date='', hours=0) {
  worklogRows.push({ date, hours: parseFloat(hours)||0, memo: '' });
  renderWorklogList();
}

function removeWorklogRow(idx) {
  worklogRows.splice(idx, 1);
  renderWorklogList();
}

function renderWorklogList() {
  const container = document.getElementById('worklog-list');
  if (!container) return;
  container.innerHTML = worklogRows.map((r, i) => `
    <div class="worklog-row" style="flex-wrap:wrap;align-items:flex-start">
      <div style="display:flex;gap:8px;align-items:center;width:100%">
        <input type="date" value="${esc(toInputDate(r.date))}"
          oninput="worklogRows[${i}].date=fromInputDate(this.value)" style="flex:none;width:150px">
        <input type="number" min="0" step="0.1" placeholder="工数(h)" value="${r.hours||''}"
          oninput="worklogRows[${i}].hours=parseFloat(this.value)||0; recalcWorklogTotal()"
          style="width:90px;min-width:0;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-size:12px;font-family:var(--font-body);outline:none">
        <span style="font-size:12px;color:var(--text-sub);flex-shrink:0">h</span>
        <button type="button" class="del-row" onclick="removeWorklogRow(${i})"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <input type="text" value="${esc(r.memo||'')}" placeholder="作業メモ（任意）"
        oninput="worklogRows[${i}].memo=this.value"
        style="width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-size:12px;font-family:var(--font-body);outline:none;margin-top:4px">
    </div>
  `).join('');
  recalcWorklogTotal();
}

function recalcWorklogTotal() {
  const totalH = worklogRows.reduce((s, r) => s + (parseFloat(r.hours)||0), 0);
  const disp = totalH % 1 === 0 ? totalH : totalH.toFixed(1);
  const el = document.getElementById('worklog-total');
  if (el) el.textContent = disp;
  const actEl = document.getElementById('f-act');
  if (actEl) actEl.value = disp;

  // 予定工数を基に進捗を自動計算
  const estH = parseFloat(document.getElementById('f-est')?.value) || 0;
  if (estH > 0 && totalH >= 0) {
    const prog = Math.min(Math.round(totalH / estH * 100), 100);
    const progEl = document.getElementById('f-progress');
    const progVal = document.getElementById('progress-val');
    if (progEl) progEl.value = prog;
    if (progVal) progVal.textContent = prog;
  }
}

// ── COPY TASK ────────────────────────────────────────────────────────
function copyTask(id) {
  const src = tasks.find(x => x.id === id);
  if (!src) return;
  const copy = {
    ...src,
    id: newId(),
    'タスク名': src['タスク名'] + '（コピー）',
    'ステータス': '未着手',
    '進捗': '0',
    '作業日': '',
    '作業ログ': '[]',
    '実績工数': '0',
    '作成日': today(),
  };
  tasks.push(copy);
  save();
  renderView();
  toast('タスクをコピーしました');
  pushTask(copy);
}

function openTaskModal(id) {
  populateMemberSelect();
  const t = id ? tasks.find(x=>x.id===id) : null;
  document.getElementById('modal-title').textContent = t ? 'タスク編集' : 'タスク追加';
  document.getElementById('f-id').value       = t?.id || '';
  document.getElementById('f-name').value     = t?.['タスク名'] || '';
  document.getElementById('f-cat').value      = t?.['カテゴリ'] || '';
  document.getElementById('f-desc').value     = t?.['説明'] || '';
  document.getElementById('f-member').value   = t?.['担当者名'] || t?.['担当者ID'] || '';
  document.getElementById('f-status').value   = t?.['ステータス'] || '未着手';
  document.getElementById('f-priority').value = t?.['優先度'] || '';
  document.getElementById('f-deadline').value  = toInputDate(t?.['期限']);
  document.getElementById('f-startdate').value = toInputDate(t?.['開始日']);

  // 繰り返し曜日
  const repeatDows = t?.['繰り返し'] ? t['繰り返し'].split(',').map(Number) : [];
  document.querySelectorAll('.f-repeat-dow').forEach(cb => {
    cb.checked = repeatDows.includes(parseInt(cb.value));
  });
  document.getElementById('f-est').value      = t?.['予定工数'] || '';
  document.getElementById('f-act').value      = t?.['実績工数'] || '';
  document.getElementById('f-progress').value = t?.['進捗'] || '0';
  document.getElementById('progress-val').textContent = t?.['進捗'] || '0';

  // 予定工数をworklogセクションに表示
  const estDisp = document.getElementById('worklog-est-display');
  if (estDisp) estDisp.textContent = t?.['予定工数'] || '—';

  // 作業ログを復元（JSON形式で保存されている）
  try {
    worklogRows = t?.['作業ログ'] ? JSON.parse(t['作業ログ']) : [];
  } catch { worklogRows = []; }

  // 旧フォーマット（hours形式）をmins形式に移行（memoは保持）
  worklogRows = worklogRows.map(r => ({
    date: r.date || '',
    hours: r.hours !== undefined ? parseFloat(r.hours)||0 : (parseInt(r.mins)||0) / 60,
    memo: r.memo || ''
  }));

  // 旧データ互換：作業日＋実績工数が単一の場合
  if (worklogRows.length === 0 && t?.['作業日'] && parseFloat(t?.['実績工数']) > 0) {
    worklogRows = [{ date: t['作業日'], hours: parseFloat(t['実績工数'])||0, memo: '' }];
  }

  renderWorklogList();
  document.getElementById('task-modal').classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 50);
}

async function saveTask() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { toast('タスク名を入力してください', false); return; }
  const id = document.getElementById('f-id').value;

  const validLogs = worklogRows.filter(r => r.date || parseFloat(r.hours) > 0);
  const totalH    = validLogs.reduce((s, r) => s + (parseFloat(r.hours)||0), 0);
  const totalAct  = totalH % 1 === 0 ? String(totalH) : totalH.toFixed(1);
  const latestDate = validLogs.map(r=>r.date).filter(Boolean).sort().slice(-1)[0] || '';

  const status = document.getElementById('f-status').value;
  const progress = status === '完了' ? '100' : document.getElementById('f-progress').value;

  const task = {
    id: id || newId(),
    'タスク名':  name,
    'カテゴリ':  document.getElementById('f-cat').value,
    '説明':      document.getElementById('f-desc').value.trim(),
    '担当者名':  document.getElementById('f-member').value,
    'ステータス': status,
    '優先度':    document.getElementById('f-priority').value,
    '開始日':    fromInputDate(document.getElementById('f-startdate').value),
    '期限':      fromInputDate(document.getElementById('f-deadline').value),
    '繰り返し':  [...document.querySelectorAll('.f-repeat-dow:checked')].map(cb=>cb.value).join(','),
    '予定工数':  document.getElementById('f-est').value || '0',
    '実績工数':  String(totalAct),
    '進捗':      progress,
    '作業日':    latestDate,
    '作業ログ':  JSON.stringify(validLogs),
    '作成日':    id ? (tasks.find(x=>x.id===id)?.['作成日'] || today()) : today(),
  };

  if (id) { const i = tasks.findIndex(x=>x.id===id); if(i>=0) tasks[i]=task; else tasks.push(task); }
  else tasks.push(task);
  save();
  closeModal('task-modal');
  renderView();
  toast(id ? 'タスクを更新しました' : 'タスクを追加しました');
  pushTask(task);
}

async function deleteTask(id) {
  if (!confirm('タスクを削除しますか？')) return;
  tasks = tasks.filter(t=>t.id!==id);
  save(); renderView();
  toast('削除しました');
  pushDeleteTask(id);
}

// ── MEMBER MODAL ────────────────────────────────────────────────────
function openMemberModal(id) {
  const m = id ? members.find(x=>x.id===id) : null;
  document.getElementById('mbr-modal-title').textContent = m ? 'メンバー編集' : 'メンバー追加';
  document.getElementById('mbr-id').value   = m?.id || '';
  document.getElementById('mbr-name').value = m?.名前 || '';
  document.getElementById('mbr-role').value = m?.ロール || '';
  selectColorVal(m?.カラー || '#6366f1');
  document.getElementById('member-modal').classList.add('open');
  setTimeout(() => document.getElementById('mbr-name').focus(), 50);
}

function selectColor(el) {
  document.querySelectorAll('.color-opt').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');
}

function selectColorVal(color) {
  document.querySelectorAll('.color-opt').forEach(e=>{
    e.classList.toggle('selected', e.dataset.c === color);
  });
}

async function saveMember() {
  const name = document.getElementById('mbr-name').value.trim();
  if (!name) { toast('名前を入力してください', false); return; }
  const id    = document.getElementById('mbr-id').value;
  const color = document.querySelector('.color-opt.selected')?.dataset.c || '#6366f1';
  const m = {
    id: id || newId(),
    名前: name,
    ロール: document.getElementById('mbr-role').value.trim(),
    カラー: color
  };
  if (id) { const i = members.findIndex(x=>x.id===id); if(i>=0) members[i]=m; else members.push(m); }
  else members.push(m);
  save(); populateMemberSelect();
  closeModal('member-modal');
  renderMembers();
  toast(id ? 'メンバーを更新しました' : 'メンバーを追加しました');
  pushMembers();
}

async function deleteMember(id) {
  if (!confirm('メンバーを削除しますか？このメンバーに割り当てられたタスクの担当者は未割当になります。')) return;
  members = members.filter(m=>m.id!==id);
  tasks = tasks.map(t=>t['担当者ID']===id ? {...t,'担当者ID':''} : t);
  save(); populateMemberSelect(); renderMembers();
  toast('削除しました');
  pushMembers();
}

// ── MODAL HELPERS ───────────────────────────────────────────────────
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

// ── KEYBOARD ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.open').forEach(m=>m.classList.remove('open'));
  }
  if (e.ctrlKey && e.key === 'Enter' && document.getElementById('task-modal').classList.contains('open')) saveTask();
});

// close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(el=>{
  el.addEventListener('click', e=>{ if(e.target===el) el.classList.remove('open'); });
});

// ── INIT ────────────────────────────────────────────────────────────
// ローカルキャッシュの旧データを変換
tasks = tasks.map(normalizeTask);
save();
populateMemberSelect();
setView('tasks');
if (!GAS_URL) setSyncState('', '未接続 — 設定からURLを入力してください');
else setSyncState('ok', 'ローカルキャッシュ使用中');
</script>
